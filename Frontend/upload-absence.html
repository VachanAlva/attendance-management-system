<!DOCTYPE html>
<html>
<head>
    <title>Upload Absence</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Upload Absence Details</h1>
    <nav>
        <a href="student-dashboard.html">Back</a>
        <a href="index.html">Logout</a>
    </nav>
</header>

<div class="container">

    <div class="card">

        <label>Select Subject</label>
        <select>
            <option>Subject 1</option>
            <option>Subject 2</option>
        </select>

        <label>Select Date</label>
        <input type="date">

        <label>Reason</label>
        <textarea rows="4" placeholder="Enter reason"></textarea>

        <label>Upload Document</label>
        <input type="file">

        <button>Submit</button>

    </div>

</div>
<script>

document.querySelector("button").addEventListener("click", function(){

    const subject = document.querySelector("select").value;
    const date = document.querySelector("input[type='date']").value;
    const reason = document.querySelector("textarea").value;

    fetch("http://localhost:3000/upload-absence", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            student_id: 1,
            subject: subject,
            date: date,
            reason: reason
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
    });

});

</script>
</body>
</html>
