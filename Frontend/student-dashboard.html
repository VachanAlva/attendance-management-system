<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Student Dashboard</h1>
    <nav>
        <a href="index.html">Logout</a>
    </nav>
</header>

<div class="container">

    <div class="card">
        <h2>Attendance Summary</h2>

        <table id="attendanceTable">
            <tr>
                <th>Subject</th>
                <th>Total</th>
                <th>Attended</th>
                <th>Absent</th>
                <th>Percentage</th>
                <th>Status</th>
            </tr>
        </table>
    </div>

    <div class="card">
        <a href="upload-absence.html">
            <button>Upload Absence Reason</button>
        </a>
    </div>

</div>

<script>

const student_id = localStorage.getItem("student_id");

fetch(`http://localhost:3000/student-attendance/${student_id}`)
.then(res => res.json())
.then(data => {

    const table = document.getElementById("attendanceTable");

    data.forEach(subject => {

        const total = subject.total;
        const present = subject.present;
        const absent = total - present;

        const percentage = Math.round((present / total) * 100);

        const row = table.insertRow();

        row.insertCell(0).innerText = subject.subject;
        row.insertCell(1).innerText = total;
        row.insertCell(2).innerText = present;
        row.insertCell(3).innerText = absent;
        row.insertCell(4).innerText = percentage + "%";

        const statusCell = row.insertCell(5);

        if(percentage >= 75){
            statusCell.innerText = "Safe";
            statusCell.style.color = "green";
        } else {
            statusCell.innerText = "Shortage";
            statusCell.style.color = "red";
        }

    });

});

</script>

</body>
</html>
