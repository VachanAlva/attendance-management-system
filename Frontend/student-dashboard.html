
<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Student Dashboard</h1>
    <nav>
        <a href="index.html">Logout</a>
    </nav>
</header>

<div class="container">

    <div class="card">
        <h2>Attendance Summary</h2>

        <table>
            <tr>
                <th>Subject</th>
                <th>Total</th>
                <th>Attended</th>
                <th>Absent</th>
                <th>Percentage</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Subject 1</td>
                <td>40</td>
                <td>36</td>
                <td>4</td>
                <td>90%</td>
                <td class="safe">Safe</td>
            </tr>

            <tr>
                <td>Subject 2</td>
                <td>30</td>
                <td>20</td>
                <td>10</td>
                <td>66%</td>
                <td class="warning">Shortage</td>
            </tr>
        </table>
    </div>

    <div class="card">
        <a href="upload-absence.html">
            <button>Upload Absence Reason</button>
        </a>
    </div>

</div>

</body>
</html>
