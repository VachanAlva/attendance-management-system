<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Student Login</h1>
    <nav>
        <a href="index.html">Back</a>
    </nav>
</header>

<div class="container center-card">
    <div class="card">

        <label>Student ID</label>
        <input type="text" placeholder="Enter Student ID">

        <label>Password</label>
        <input type="password" placeholder="Enter Password">

        
            <button id="studentLoginBtn">Login</button>
       

    </div>
</div>
<script>

document.getElementById("studentLoginBtn").addEventListener("click", function(){

    const student_id = document.querySelector("input[type='text']").value;
    const password = document.querySelector("input[type='password']").value;

    fetch("http://localhost:3000/student-login", {
        method: "POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            student_id: student_id,
            password: password
        })
    })
    .then(res => res.text())
    .then(data => {

        if(data === "success"){
            localStorage.setItem("student_id", student_id);
            window.location.href = "student-dashboard.html";
        }
        else{
            alert("Invalid Student Login");
        }

    });

});

</script>
</body>
</html>
